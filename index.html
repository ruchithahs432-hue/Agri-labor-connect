<!DOCTYPE html>
<html>
<head>
    <title>AgriLink</title>

    <style>
        body {
            font-family: Arial;
            background-color: #f5f5f5;
            text-align: center;
        }

        h1 {
            color: green;
        }

        .container {
            background: white;
            padding: 20px;
            margin: 20px auto;
            width: 300px;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }

        input {
            width: 90%;
            padding: 8px;
            margin: 5px;
        }

        button {
            background-color: green;
            color: white;
            padding: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .job {
            background: #e8f5e9;
            padding: 10px;
            margin-top: 10px;
            border-radius: 5px;
        }
    </style>
</head>

<body>

    <h1>🌾 AgriLink</h1>
    <p>Connecting Farmers & Laborers</p>

    <div class="container">
        <h3>Post a Job</h3>

        <input type="text" id="work" placeholder="Work Type"><br>
        <input type="date" id="date"><br>
        <input type="text" id="location" placeholder="Location"><br>
        <input type="number" id="wage" placeholder="Wage"><br>

        <button onclick="postJob()">Post Job</button>
    </div>

    <div class="container">
        <h3>Available Jobs</h3>
        <div id="jobs"></div>
    </div>

    <script>
        function postJob() {
            let work = document.getElementById("work").value;
            let date = document.getElementById("date").value;
            let location = document.getElementById("location").value;
            let wage = document.getElementById("wage").value;

            let job = `
                <div class="job">
                    <b>${work}</b><br>
                    Date: ${date}<br>
                    Location: ${location}<br>
                    Wage: ₹${wage}
                </div>
            `;

            document.getElementById("jobs").innerHTML += job;
        }
    </script>

</body>
</html>
