<!DOCTYPE html>
<html>
<head>
    <title>AgriLink</title>
</head>
<body>

    <h1>AgriLink 🌾</h1>
    <h3>Connecting Farmers & Laborers</h3>

    <hr>

    <h2>Post a Job (Farmer)</h2>
    <form>
        <label>Work Type:</label><br>
        <input type="text" placeholder="e.g. Harvesting"><br><br>

        <label>Date:</label><br>
        <input type="date"><br><br>

        <label>Location:</label><br>
        <input type="text" placeholder="Village/Area"><br><br>

        <label>Wage (₹):</label><br>
        <input type="number"><br><br>

        <button type="submit">Post Job</button>
    </form>

    <hr>

    <h2>Available Jobs (Laborers)</h2>
    <p>No jobs yet...</p>

</body>
</html>
