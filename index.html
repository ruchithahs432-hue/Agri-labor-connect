<!DOCTYPE html>
<html>
<head>
    <title>AgriLink</title>

    <style>
        body {
            font-family: Arial;
            background-color: #f5f5f5;
            text-align: center;
        }

        h1 {
            color: green;
        }

        .container {
            background: white;
            padding: 20px;
            margin: 20px auto;
            width: 300px;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }

        input {
            width: 90%;
            padding: 8px;
            margin: 5px;
        }

        button {
            background-color: green;
            color: white;
            padding: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: darkgreen;
        }
    </style>
</head>

<body>

    <h1>🌾 AgriLink</h1>
    <p>Connecting Farmers & Laborers</p>

    <div class="container">
        <h3>Post a Job</h3>

        <input type="text" placeholder="Work Type"><br>
        <input type="date"><br>
        <input type="text" placeholder="Location"><br>
        <input type="number" placeholder="Wage"><br>

        <button>Post Job</button>
    </div>

    <div class="container">
        <h3>Available Jobs</h3>
        <p>No jobs yet...</p>
    </div>

</body>
</html>
